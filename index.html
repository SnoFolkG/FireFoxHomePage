<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SnoFolk</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Playfair Display",serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgb(43,42,51);
  color:white;
  overflow:hidden;
  position:relative;
}

/* static ambient background light */
.background-light{
  position:absolute;
  top:50%;
  left:50%;
  width:750px;
  height:750px;
  background:radial-gradient(circle, rgba(110,110,255,.35), transparent 70%);
  filter:blur(150px);
  transform:translate(-50%, -50%);
  pointer-events:none;
}

/* glass card */
.card{
  width:640px;
  padding:50px 55px;
  border-radius:48px;
  background:linear-gradient(160deg, rgba(255,255,255,.05), rgba(0,0,0,.55));
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(55px) saturate(200%);
  box-shadow:0 50px 140px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.25);
  display:flex;
  align-items:center;
  gap:20px;
  position:relative;
  overflow:hidden;
  transition:transform .15s ease-out, box-shadow .2s ease;
  animation:cardIn .8s ease;
}

/* refraction layer for micro-parallax */
.refraction{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 40%, rgba(255,255,255,.12), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,.08), transparent 60%);
  mix-blend-mode:overlay;
  pointer-events:none;
  transition:transform .2s ease-out;
}

/* moving highlight */
.card::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent);
  top:-50%;
  left:-50%;
  animation:shine 18s linear infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

@keyframes cardIn{
  from{opacity:0; transform:translateY(30px) scale(.95);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

/* greeting */
.greeting{
  font-size:22px;
  white-space:nowrap;
  opacity:.92;
  user-select:none;
}

/* search */
.search{
  flex:1;
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:32px;
  padding:6px;
  backdrop-filter:blur(20px);
}

.search input{
  flex:1;
  padding:14px 18px;
  border:none;
  background:transparent;
  color:white;
  font-size:15px;
  outline:none;
  font-family:system-ui;
}

.search button{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.25);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.25s;
}

.search button:hover{
  background:rgba(255,255,255,.45);
  transform:scale(1.08);
}

.search svg{
  width:18px;
  height:18px;
  fill:white;
}

/* cursor light */
.cursor-light{
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(255,255,255,.25), transparent 70%);
  filter:blur(50px);
  pointer-events:none;
  mix-blend-mode:screen;
}
</style>
</head>

<body>

<div class="background-light"></div>

<div class="card" id="card">
  <div class="refraction"></div>
  <div class="cursor-light" id="cursorLight"></div>

  <div class="greeting" id="greeting"></div>

  <form action="https://duckduckgo.com/" method="get" class="search">
    <input id="searchBox" name="q" placeholder="Search DuckDuckGo" autofocus>
    <button type="submit">
      <svg viewBox="0 0 24 24"><path d="M21 20l-5.6-5.6a7 7 0 10-1.4 1.4L20 21zM5 10a5 5 0 1110 0A5 5 0 015 10z"/></svg>
    </button>
  </form>

</div>

<script>
// greeting
function greeting(){
  let h=new Date().getHours()
  let text=""
  if(h<5) text="Good night"
  else if(h<12) text="Good morning"
  else if(h<18) text="Good afternoon"
  else text="Good evening"
  document.getElementById("greeting").textContent = text + ", SnoFolk."
}
greeting()

// slash search
document.addEventListener("keydown",e=>{
  if(e.key==="/"){e.preventDefault(); document.getElementById("searchBox").focus();}
})

// glass interaction with improved parallax
const card = document.getElementById("card")
const light = document.getElementById("cursorLight")
const refraction = card.querySelector(".refraction")

document.addEventListener("mousemove", e=>{
  const rect = card.getBoundingClientRect()
  const offsetX = (e.clientX - rect.left) - rect.width/2
  const offsetY = (e.clientY - rect.top) - rect.height/2

  // card tilt
  card.style.transform = `rotateX(${-offsetY/25}deg) rotateY(${offsetX/25}deg)`

  // micro-parallax for refraction
  refraction.style.transform = `translate(${offsetX/50}px, ${offsetY/50}px)`

  // cursor light
  light.style.left = `${e.clientX - 150}px`
  light.style.top = `${e.clientY - 150}px`
})

// reset on leave
document.addEventListener("mouseleave", ()=>{
  card.style.transform="rotateX(0) rotateY(0)"
  refraction.style.transform="translate(0,0)"
})
</script>

</body>
</html>
